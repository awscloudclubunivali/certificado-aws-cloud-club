<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificado AWS Cloud Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      @page {
        size: 1300px 960px;
        margin: 0;
      }

      html {
        width: 1300px;
        height: 960px;
        overflow: hidden;
      }

      body {
        margin: 0;
        padding: 120px 125px;
        width: 1300px;
        height: 960px;
        box-sizing: border-box;
        background-color: #05050a;
        -webkit-print-color-adjust: exact;
        background-image:
          radial-gradient(
            circle at 15% 40%,
            rgba(109, 40, 217, 0.7),
            transparent 45%
          ),
          radial-gradient(
            circle at 85% 20%,
            rgba(30, 58, 138, 0.7),
            transparent 45%
          ),
          radial-gradient(
            circle at 50% 80%,
            rgba(192, 38, 211, 0.4),
            transparent 50%
          );
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background-image:
          radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 40px 70px, #e0e7ff, rgba(0, 0, 0, 0)),
          radial-gradient(3px 3px at 90px 40px, #ffffff, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 160px 120px, #c7d2fe, rgba(0, 0, 0, 0)),
          radial-gradient(3px 3px at 200px 200px, #ffffff, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 300px 100px, #c7d2fe, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 350px 250px, #ffffff, rgba(0, 0, 0, 0)),
          radial-gradient(3px 3px at 500px 150px, #ffffff, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 600px 350px, #e0e7ff, rgba(0, 0, 0, 0));
        background-size: 600px 600px;
        opacity: 0.9;
        animation: starsMove 150s linear infinite;
      }

      @keyframes starsMove {
        from { background-position: 0 0; }
        to   { background-position: -600px -600px; }
      }

      .cert-container {
        position: relative;
        width: 1050px;
        height: 720px;
        background-color: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 8px solid #1a1a1a;
        border-radius: 20px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
        padding: 60px;
        box-sizing: border-box;
        display: flex;
        overflow: hidden;
      }

      .ribbon-wrapper {
        position: absolute;
        top: 0;
        right: 120px;
        display: flex;
        height: 350px;
        width: 100px;
        border-left: 2px solid #1a1a1a;
        border-right: 2px solid #1a1a1a;
        border-bottom: 2px solid #1a1a1a;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        z-index: 1;
      }

      .stripe { height: 100%; }

      .stripe.purple {
        flex: 1;
        background: linear-gradient(180deg, #3b0764 0%, #9333ea 50%, #3b0764 100%);
      }

      .stripe.blue {
        flex: 1.2;
        background: linear-gradient(180deg, #1e3a8a 0%, #3b82f6 50%, #1e3a8a 100%);
        border-left: 2px solid #1a1a1a;
        border-right: 2px solid #1a1a1a;
      }

      .cert-logo {
        position: absolute;
        top: 140px;
        right: 45px;
        width: 250px;
        height: 250px;
        z-index: 2;
        object-fit: contain;
        filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.4));
      }

      .signature-block {
        position: absolute;
        bottom: 60px;
        right: 40px;
        width: 260px;
        text-align: center;
        z-index: 3;
      }

      .sig-image {
        max-width: 220px;
        max-height: 70px;
        object-fit: contain;
        margin-bottom: 5px;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }

      .sig-line {
        width: 100%;
        height: 3px;
        background-color: #1a1a1a;
        margin-bottom: 12px;
        border: none;
      }

      .sig-name {
        font-family: "Playfair Display", serif;
        font-size: 22px;
        font-weight: 700;
        color: #1a1a1a;
        margin: 0 0 5px 0;
      }

      .sig-role {
        font-family: "Montserrat", sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #333333;
        margin: 0;
      }

      .content-left {
        width: 66%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 3;
        padding: 10px 0;
      }

      .cert-title {
        font-family: "Cinzel", serif;
        font-size: 75px;
        font-weight: 900;
        margin: 0;
        color: #000000;
        letter-spacing: 2px;
        text-shadow: 0px 0px 10px rgba(255, 255, 255, 0.9);
      }

      .text-block {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin-top: -15px;
      }

      .label {
        font-family: "Montserrat", sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 25px;
      }

      .name {
        font-family: "Playfair Display", serif;
        font-size: 50px;
        font-weight: bold;
        color: #000000;
        margin: 0 0 30px 0;
        letter-spacing: 1px;
        text-shadow: 0px 0px 8px rgba(255, 255, 255, 0.8);
        text-align: center;
      }

      .body-text {
        font-family: "Montserrat", sans-serif;
        font-size: 16px;
        line-height: 1.6;
        text-align: justify;
        text-align-last: center;
        color: #1a1a1a;
        font-weight: 600;
        max-width: 100%;
        margin: 0;
        text-shadow: 0px 0px 5px rgba(255, 255, 255, 0.5);
      }

      .body-text strong { color: #000000; font-weight: 800; }

      .date {
        font-family: "Montserrat", sans-serif;
        font-size: 16px;
        font-weight: 700;
        color: #1a1a1a;
        text-align: center;
        margin: 0;
        margin-bottom: 10px;
        text-shadow: 0px 0px 5px rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="cert-container">

      <!-- Fita Decorativa -->
      <div class="ribbon-wrapper">
        <div class="stripe purple"></div>
        <div class="stripe blue"></div>
        <div class="stripe purple"></div>
      </div>

      <!-- Logo / Mascote -->
      <img
        src="{{ LOGO_URL }}"
        alt="Logo Mascote"
        class="cert-logo"
      />

      <!-- Assinatura -->
      <div class="signature-block">
        <img
          src="{{ SIGNER_IMAGE }}"
          alt="Assinatura"
          class="sig-image"
        />
        <hr class="sig-line" />
        <p class="sig-name">{{ SIGNER_NAME }}</p>
        <p class="sig-role">{{ SIGNER_ROLE }}</p>
      </div>

      <!-- Conteúdo principal -->
      <div class="content-left">
        <h1 class="cert-title">CERTIFICADO</h1>

        <div class="text-block">
          <p class="label">Certificamos que:</p>
          <h2 class="name">{{ NOME_PARTICIPANTE }}</h2>
          <p class="body-text">{{ CORPO_CERTIFICADO }}</p>
        </div>

        <p class="date">{{ LOCAL_EVENTO }}, {{ DATA_EVENTO }}</p>
      </div>

    </div>
  </body>
</html>
