name: Gerar e Enviar Certificados

on:
  # Disparo manual com controle de modo e envio de email
  workflow_dispatch:
    inputs:
      modo:
        description: "Qual tipo de certificado gerar?"
        required: true
        default: "ambos"
        type: choice
        options:
          - participantes
          - organizadores
          - ambos
      enviar_emails:
        description: "Enviar os certificados por email?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

  # Disparo automático ao atualizar os CSVs na branch main
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - "data/participantes.csv"
  #     - "data/organizadores.csv"

jobs:
  gerar-certificados:
    name: Gerar PDFs e Enviar Emails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do sistema para o Puppeteer (Chromium)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            libxshmfence1 \
            libdrm2

      - name: Instalar dependências Node.js
        run: npm install

      - name: Definir variáveis SMTP (somente se enviar_emails=true)
        id: smtp
        if: ${{ github.event.inputs.enviar_emails == 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          echo "SMTP_HOST=${SMTP_HOST}"   >> $GITHUB_ENV
          echo "SMTP_PORT=${SMTP_PORT}"   >> $GITHUB_ENV
          echo "SMTP_USER=${SMTP_USER}"   >> $GITHUB_ENV
          echo "SMTP_PASS=${SMTP_PASS}"   >> $GITHUB_ENV
          echo "SMTP_FROM=${SMTP_FROM}"   >> $GITHUB_ENV

      - name: Gerar certificados — Participantes
        if: ${{ github.event.inputs.modo == 'participantes' || github.event.inputs.modo == 'ambos' || github.event_name == 'push' }}
        run: MODE=participante node scripts/index.js

      - name: Gerar certificados — Organizadores
        if: ${{ github.event.inputs.modo == 'organizadores' || github.event.inputs.modo == 'ambos' || github.event_name == 'push' }}
        run: MODE=organizador node scripts/index.js

      - name: Fazer upload dos certificados como artefato
        uses: actions/upload-artifact@v4
        with:
          name: certificados-pdf
          path: certificados-gerados/
          retention-days: 30
          if-no-files-found: warn
